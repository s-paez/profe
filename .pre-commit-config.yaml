exclude: '^tmp/'
repos:
  - repo: local
    hooks:
      - id: trailing-whitespace
        name: PROFE Removing whitespace at the end of line...
        entry: trailing-whitespace-fixer
        language: system
        types: [text]
      - id: debug-statements
        name: PROFE Debug statements
        entry: debug-statement-hook
        language: system
        types: [python]
      - id: end-of-file-fixer
        name: PROFE Fixing end of Python files...
        entry: end-of-file-fixer
        language: system
        types: [python]
      - id: cheack-merge-conflict
        name: PROFE checking merger conflicts..
        entry: check-merge-conflict
        language: system
        types: [python]
      - id: name-tests-test
        name: PROFE Test files pattern must be test.*\.py
        entry: name-tests-test
        language: system
        files: ^tests/
        types: [python]
        args: ["--pytest-test-first"]
      - id: ruff
        name: PROFE Linter (Ruff)
        entry: ruff check
        language: system
        types: [python]
        args: ['--fix', '--exit-non-zero-on-fix']
      - id: ruff-format
        name: PROFE Formatter (Ruff Format)
        entry: ruff format
        language: system
        types: [python]
      - id: bandit
        name: PROFE Checking security issues with Bandit
        entry: bandit
        language: system
        types: [python]
        args: ["-c", "pyproject.toml", "--skip", "B101,B311"]
      - id: mypy
        name: PROFE Check typing with MyPy
        entry: mypy
        language: system
        types: [python]
        args: [--disallow-untyped-defs, --disallow-incomplete-defs, --config-file, ./pyproject.toml, --ignore-missing-imports]
        exclude: '.*__init__\.py'
        files: '\.py'
